name: AgentBooth
options:
  deploymentTarget:
    macOS: "14.0"
  knownRegions:
    - en
    - ja
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  AgentBooth:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    configFiles:
      Debug: Configurations/DevelopmentTeam.xcconfig
      Release: Configurations/DevelopmentTeam.xcconfig
    sources:
      - path: AgentBooth
        excludes:
          - agentbooth.icon
      - path: AgentBooth/agentbooth.icon
        buildPhase: resources
    dependencies:
      - sdk: ScreenCaptureKit.framework
      - sdk: AVFoundation.framework
      - sdk: CoreMedia.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dmng.AgentBooth
        PRODUCT_NAME: AgentBooth
        ASSETCATALOG_COMPILER_APPICON_NAME: agentbooth
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: AgentBooth
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.music"
        INFOPLIST_KEY_NSAppleEventsUsageDescription: AgentBooth needs automation access to Music.app to control playlist playback.
        INFOPLIST_KEY_NSScreenCaptureUsageDescription: AgentBooth needs System Audio Capture permission to record radio programs.
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: AgentBooth/AgentBooth.entitlements
  AgentBoothTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    configFiles:
      Debug: Configurations/DevelopmentTeam.xcconfig
      Release: Configurations/DevelopmentTeam.xcconfig
    sources:
      - path: AgentBoothTests
    dependencies:
      - target: AgentBooth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dmng.AgentBoothTests
        GENERATE_INFOPLIST_FILE: YES
